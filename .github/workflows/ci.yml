name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - run: npm ci --ignore-scripts
      - run: npm run ci
      - run: pip install skylos
      - run: skylos . -a --format json --output skylos-results.json
      - run: skylos . --gate
      - run: node scripts/update-skylos-badge.mjs skylos-results.json

  skylos-badge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - run: pip install skylos
      - run: skylos . -a --format json --output skylos-results.json
      - run: node scripts/update-skylos-badge.mjs skylos-results.json
      - run: |
          if git diff --quiet -- .github/badges/skylos.json; then
            echo "Skylos badge already up to date."
          else
            echo "Skylos badge changed. Open a pull request to update .github/badges/skylos.json"
            git diff -- .github/badges/skylos.json
          fi
